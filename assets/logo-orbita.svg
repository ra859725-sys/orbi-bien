<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Órbita TCG</title>
  <desc id="desc">Logo minimalista espacial de Órbita TCG</desc>
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity=".95"/>
      <stop offset="48%" stop-color="#4c1d95" stop-opacity=".88"/>
      <stop offset="100%" stop-color="#08070d" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="640" rx="128" fill="#05040a"/>
  <circle cx="320" cy="300" r="122" fill="url(#g)" filter="url(#glow)"/>
  <ellipse cx="320" cy="300" rx="210" ry="56" transform="rotate(-16 320 300)" fill="none" stroke="#f7f3ff" stroke-width="18" opacity=".92"/>
  <ellipse cx="320" cy="300" rx="248" ry="76" transform="rotate(-16 320 300)" fill="none" stroke="#a78bfa" stroke-width="3" opacity=".7"/>
  <circle cx="482" cy="248" r="19" fill="#ffffff"/>
  <circle cx="492" cy="242" r="31" fill="none" stroke="#a78bfa" stroke-width="2" opacity=".6"/>
  <path d="M146 424h348" stroke="#a78bfa" stroke-width="2" opacity=".45"/>
  <text x="320" y="482" text-anchor="middle" font-family="Montserrat, Inter, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="8" fill="#ffffff">ÓRBITA</text>
  <text x="320" y="534" text-anchor="middle" font-family="Montserrat, Inter, Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="12" fill="#c4b5fd">TCG</text>
</svg>
