<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-labelledby="title desc">
  <title id="title">Algo se acerca</title>
  <desc id="desc">Imagen de apertura misteriosa con órbita violeta y cartas flotando.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0" stop-color="#2e1065"/>
      <stop offset=".48" stop-color="#111021"/>
      <stop offset="1" stop-color="#030208"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".92"/>
      <stop offset="1" stop-color="#9f7aea" stop-opacity=".42"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="700" fill="url(#bg)"/>
  <g opacity=".42">
    <circle cx="129" cy="94" r="2" fill="#fff"/><circle cx="310" cy="160" r="2" fill="#fff"/><circle cx="1420" cy="98" r="2" fill="#fff"/><circle cx="1180" cy="518" r="2" fill="#fff"/><circle cx="706" cy="66" r="2" fill="#fff"/><circle cx="1474" cy="408" r="2" fill="#fff"/><circle cx="448" cy="575" r="2" fill="#fff"/>
  </g>
  <ellipse cx="825" cy="350" rx="530" ry="128" transform="rotate(-12 825 350)" fill="none" stroke="#8b5cf6" stroke-width="5" opacity=".85" filter="url(#glow)"/>
  <ellipse cx="825" cy="350" rx="360" ry="82" transform="rotate(-12 825 350)" fill="none" stroke="#ffffff" stroke-width="2" opacity=".38"/>
  <circle cx="900" cy="336" r="150" fill="#7c3aed" opacity=".28" filter="url(#glow)"/>
  <circle cx="900" cy="336" r="92" fill="#140d2a" stroke="#ddd6fe" stroke-width="2" opacity=".95"/>
  <g transform="translate(250 170) rotate(-11)">
